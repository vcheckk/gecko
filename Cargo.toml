[workspace]
resolver = "3"
members = [
    "crates/gctool",
    "crates/disasm",
    "crates/gecko",
    "crates/tinytracer",
    "crates/tinybench",
    "crates/image",
    "crates/tinyapp",
    "crates/backend-wgpu",
    "crates/scripting",
    "crates/dspemu",

    # Stuff we rarely use
    "crates/dsptestrunner",
]
default-members = [
    "crates/gctool",
    "crates/disasm",
    "crates/gecko",
    "crates/tinytracer",
    "crates/tinybench",
    "crates/image",
    "crates/tinyapp",
    "crates/backend-wgpu",
    "crates/scripting",
    "crates/dspemu",
]

# TODO: DO THESE BEFORE MASTER MERGE
exclude = [
    # Web targets WebGL; the new renderer uses wgpu features that GLES
    # does not expose. Needs a separate fallback renderer.
    "crates/web",

    # Temporarily excluded. These need a egui/dbglib rewrite.
    "crates/dbglib",
    "crates/debugger",
]

[patch.crates-io]
egui = { git = "https://github.com/ioncodes/egui.git" }
epaint = { git = "https://github.com/ioncodes/egui.git" }
emath = { git = "https://github.com/ioncodes/egui.git" }
ecolor = { git = "https://github.com/ioncodes/egui.git" }
egui-wgpu = { git = "https://github.com/ioncodes/egui.git" }
egui-winit = { git = "https://github.com/ioncodes/egui.git" }

[profile.release]
codegen-units = 1
lto = "fat"
debug = true

[profile.dev]
opt-level = 3
