[workspace]
resolver = "3"
members = [
    "crates/gctool",
    "crates/disasm",
    "crates/gecko",
    "crates/tinyemu",
    "crates/image",
    "crates/tinyapp",
    "crates/backend-wgpu",
    "crates/debugger",
    "crates/scripting",
]

[patch.crates-io]
egui = { git = "https://github.com/ioncodes/egui.git" }
epaint = { git = "https://github.com/ioncodes/egui.git" }
emath = { git = "https://github.com/ioncodes/egui.git" }
ecolor = { git = "https://github.com/ioncodes/egui.git" }
egui-wgpu = { git = "https://github.com/ioncodes/egui.git" }
egui-winit = { git = "https://github.com/ioncodes/egui.git" }

[profile.release]
lto = "fat"
codegen-units = 1
debug = false
opt-level = 3
debug-assertions = false

[profile.dev]
debug = true
opt-level = 3
debug-assertions = false

[profile.fast]
inherits = "dev"
debug-assertions = true
opt-level = 3
lto = false