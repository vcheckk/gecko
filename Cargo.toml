[workspace]
resolver = "3"
members = [
    "crates/gctool",
    "crates/disasm",
    "crates/gecko",
    "crates/tinytracer",
    "crates/tinybench",
    "crates/image",
    "crates/tinyapp",
    "crates/backend-wgpu",
    "crates/dbglib",
    "crates/debugger",
    "crates/scripting",
    "crates/dspemu",
    
    # Stuff we rarely use
    "crates/dsptestrunner",
    "crates/web",
]
default-members = [
    "crates/gctool",
    "crates/disasm",
    "crates/gecko",
    "crates/tinytracer",
    "crates/tinybench",
    "crates/image",
    "crates/tinyapp",
    "crates/backend-wgpu",
    "crates/dbglib",
    "crates/debugger",
    "crates/scripting",
    "crates/dspemu",
]

[patch.crates-io]
egui = { git = "https://github.com/ioncodes/egui.git" }
epaint = { git = "https://github.com/ioncodes/egui.git" }
emath = { git = "https://github.com/ioncodes/egui.git" }
ecolor = { git = "https://github.com/ioncodes/egui.git" }
egui-wgpu = { git = "https://github.com/ioncodes/egui.git" }
egui-winit = { git = "https://github.com/ioncodes/egui.git" }

[profile.release-max]
inherits = "release"
codegen-units = 1
debug = false

[profile.release]
debug = true
lto = "fat"

[profile.dev]
opt-level = 3
