[package]
name = "tinyapp"
version = "0.1.0"
edition = "2024"

[features]
scripting = ["gecko/scripting", "dep:scripting"]
scripting-mut-traps = ["scripting", "gecko/scripting-mut-traps", "scripting/scripting-mut-traps"]

[dependencies]
gecko = { path = "../gecko" }
scripting = { path = "../scripting", optional = true }
image = { path = "../image" }
backend-wgpu = { path = "../backend-wgpu" }
wgpu = "28.0.0"
winit = "0.30"
pollster = "0.4"
egui = "0.33"
egui-wgpu = "0.33"
egui-winit = { version = "0.33", features = ["wayland", "x11"] }
egui_plot = "0.34"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
