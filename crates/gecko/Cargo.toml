[package]
name = "gecko"
version = "0.1.0"
edition = "2024"

[features]
idle-skip = []
hooks = []
hooks-mut-traps = ["hooks"]

[build-dependencies]
chipi-build = "0.8.2"

[dependencies]
chapa = "0.1.2"
tracing = { version = "0.1.44", features = ["release_max_level_off"] }
image = { path = "../image" }
glam = { version = "0.32.1", features = ["bytemuck"] }
bytemuck = { version = "1.25.0", features = ["derive"] }
