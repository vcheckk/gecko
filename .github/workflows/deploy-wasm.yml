name: Deploy WASM

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack-action@v0.4.0

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: wasm-

      - name: Build WASM
        run: wasm-pack build crates/web --target web --out-dir pkg --release

      - name: Build WASM (debug)
        run: wasm-pack build crates/web --target web --out-dir pkg-dbg --release -- --features debug

      - name: Prepare site
        run: |
          mkdir -p _site/dbg
          cp crates/web/index.html _site/
          cp -r crates/web/pkg _site/pkg
          cp crates/web/index.html _site/dbg/
          sed -i 's|./pkg/gecko_web.js|../pkg-dbg/gecko_web.js|' _site/dbg/index.html
          cp -r crates/web/pkg-dbg _site/pkg-dbg

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
