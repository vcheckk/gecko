name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            dbg_suffix: linux-dbg-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            dbg_suffix: windows-dbg-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            dbg_suffix: macos-dbg-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Init submodules
        run: git submodule update --init --depth 1 --recursive submodules/chipi-spec submodules/solstice

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libx11-dev libxi-dev libxrandr-dev libxcursor-dev libasound2-dev

      - name: Install mold linker
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y mold
          echo 'RUSTFLAGS=-C link-arg=-fuse-ld=mold' >> $GITHUB_ENV

      - name: Patch Cargo.toml for CI builds
        shell: bash
        run: |
          perl -pi -e 's/^#panic = "abort"$/panic = "abort"/' Cargo.toml
          perl -pi -e 's/^#codegen-units = 1$/codegen-units = 1/' Cargo.toml

      - name: Build debugger + multitool + gecko-app + tinyapp (release)
        run: cargo build --release --target ${{ matrix.target }} -p debugger -p multitool -p gecko-app -p tinyapp

      - name: Build debugger + multitool + gecko-app + tinyapp (dev profile, with tracing output)
        run: cargo build --profile dev --target ${{ matrix.target }} -p debugger -p multitool -p gecko-app -p tinyapp

      # - name: Patch chipi dispatch strategy (tinyapp only)
      #   shell: bash
      #   run: perl -pi -e 's/strategy fn_ptr_lut/strategy jump_table/g' crates/gecko/spec/*.bindings.chipi

      # - name: Build tinyapp (release)
      #   run: cargo build --release --package tinyapp --target ${{ matrix.target }}

      # - name: Build tinyapp (dev profile, with tracing output)
      #   run: cargo build --profile dev --package tinyapp --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          EXT=""
          [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"

          mkdir -p artifacts

          package() {
            local profile=$1 suffix=$2 staging=$3
            mkdir -p "$staging"
            cp "target/${{ matrix.target }}/$profile/tinyapp$EXT" "$staging/"
            cp "target/${{ matrix.target }}/$profile/debugger$EXT" "$staging/"
            cp "target/${{ matrix.target }}/$profile/multitool$EXT" "$staging/"
            cp "target/${{ matrix.target }}/$profile/gecko$EXT" "$staging/"
            cp LICENSE README.md "$staging/"
            (cd "$staging" && 7z a "../artifacts/gecko-$suffix.zip" *)
          }

          package release "${{ matrix.suffix }}" staging-rel
          package debug   "${{ matrix.dbg_suffix }}" staging-dbg

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete previous release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete release --cleanup-tag --yes --repo ${{ github.repository }} || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release
          target_commitish: ${{ github.sha }}
          name: Release (master)
          generate_release_notes: true
          files: artifacts/*
