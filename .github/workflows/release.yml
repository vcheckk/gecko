name: Release

on:
  push:
    branches: [master, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
            dbg_suffix: linux-dbg-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
            dbg_suffix: windows-dbg-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
            dbg_suffix: macos-dbg-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Init submodules
        run: |
          git submodule update --init --depth 1 --recursive submodules/chipi-spec
          git submodule update --init --depth 1 --recursive submodules/solstice

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libx11-dev libxi-dev libxrandr-dev libxcursor-dev

      - name: Build debugger + multitool (release)
        run: cargo build --release --target ${{ matrix.target }} -p debugger -p multitool

      - name: Build debugger + multitool (dev profile, with tracing output)
        run: cargo build --profile dev --target ${{ matrix.target }} -p debugger -p multitool

      - name: Patch chipi dispatch strategy (tinyapp only)
        shell: bash
        run: perl -pi -e 's/strategy fn_ptr_lut/strategy jump_table/g' crates/gecko/*.bindings.chipi

      - name: Build tinyapp (release)
        run: cargo build --release --package tinyapp --target ${{ matrix.target }}

      - name: Build tinyapp (dev profile, with tracing output)
        run: cargo build --profile dev --package tinyapp --target ${{ matrix.target }}

      - name: Package artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts

          mkdir -p staging-rel
          cp target/${{ matrix.target }}/release/tinyapp staging-rel/
          cp target/${{ matrix.target }}/release/debugger staging-rel/
          cp target/${{ matrix.target }}/release/multitool staging-rel/
          cp LICENSE README.md staging-rel/
          (cd staging-rel && zip ../artifacts/gecko-${{ matrix.suffix }}.zip tinyapp debugger multitool LICENSE README.md)

          mkdir -p staging-dbg
          cp target/${{ matrix.target }}/debug/tinyapp staging-dbg/
          cp target/${{ matrix.target }}/debug/debugger staging-dbg/
          cp target/${{ matrix.target }}/debug/multitool staging-dbg/
          cp LICENSE README.md staging-dbg/
          (cd staging-dbg && zip ../artifacts/gecko-${{ matrix.dbg_suffix }}.zip tinyapp debugger multitool LICENSE README.md)

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts

          mkdir -p staging-rel
          cp target/${{ matrix.target }}/release/tinyapp.exe staging-rel/
          cp target/${{ matrix.target }}/release/debugger.exe staging-rel/
          cp target/${{ matrix.target }}/release/multitool.exe staging-rel/
          cp LICENSE README.md staging-rel/
          (cd staging-rel && 7z a ../artifacts/gecko-${{ matrix.suffix }}.zip tinyapp.exe debugger.exe multitool.exe LICENSE README.md)

          mkdir -p staging-dbg
          cp target/${{ matrix.target }}/debug/tinyapp.exe staging-dbg/
          cp target/${{ matrix.target }}/debug/debugger.exe staging-dbg/
          cp target/${{ matrix.target }}/debug/multitool.exe staging-dbg/
          cp LICENSE README.md staging-dbg/
          (cd staging-dbg && 7z a ../artifacts/gecko-${{ matrix.dbg_suffix }}.zip tinyapp.exe debugger.exe multitool.exe LICENSE README.md)

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: artifacts/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          generate_release_notes: true
          files: artifacts/*
